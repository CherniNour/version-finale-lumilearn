```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumiLearn - تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #FF91AF;
      --color-secondary: #FFD36E;
      --color-accent: #6ED3CF;
      --color-text: #333;
    }
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#FFE5F1 0%,#E0F7FF 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .modal-overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-overlay.active { display:flex; }

    .auth-container {
      background:white;
      border-radius:30px;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      width:90%;
      max-width:420px;
      padding:35px 30px;
      position:relative;
      animation:slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to { opacity:1; transform:translateY(0); }
    }

    .close-btn {
      position:absolute;
      top:20px;
      left:20px;
      background:none;
      border:none;
      font-size:28px;
      cursor:pointer;
      color:#999;
    }

    .auth-header {
      text-align:center;
      margin-bottom:25px;
    }

    .auth-icon {
      font-size:50px;
      margin-bottom:10px;
      display:block;
    }

    .auth-header h2 {
      font-size:1.8em;
      color:var(--color-primary);
      font-weight:800;
    }

    .auth-header p {
      color:#666;
      font-size:0.9em;
      margin-top:5px;
    }

    .auth-form {
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .form-group {
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .form-group label {
      font-weight:600;
      color:var(--color-text);
      font-size:0.9em;
    }

    .form-group input,
    .form-group select {
      padding:13px 18px;
      border:2px solid #e0e0e0;
      border-radius:12px;
      font-size:1em;
      font-family:'Poppins',sans-serif;
      outline:none;
      transition:border-color 0.3s;
      background:white;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color:var(--color-primary);
    }

    .password-container { position:relative; }

    .toggle-password {
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      cursor:pointer;
      font-size:18px;
      color:#999;
    }

    .error-message {
      color:#ff4444;
      font-size:0.82em;
      display:none;
    }

    .error-message.show { display:block; }

    .btn-primary {
      background:linear-gradient(135deg,var(--color-primary),var(--color-accent));
      color:white;
      border:none;
      padding:15px;
      border-radius:12px;
      font-size:1em;
      font-weight:700;
      cursor:pointer;
      transition:all 0.3s;
      font-family:'Poppins',sans-serif;
    }

    .btn-primary:hover {
      transform:translateY(-2px);
    }

    .switch-form {
      text-align:center;
      margin-top:18px;
      color:#666;
      font-size:0.9em;
    }

    .switch-form a {
      color:var(--color-primary);
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
    }

    .success-message {
      display:none;
      text-align:center;
      padding:20px;
    }

    .success-message.show { display:block; }

    .success-icon {
      font-size:60px;
      display:block;
      margin-bottom:15px;
    }

    .success-message h3 {
      font-size:1.5em;
      color:var(--color-primary);
      margin-bottom:10px;
    }

    .success-message p {
      color:#666;
      font-size:1em;
    }

    .auth-form-container { display:none; }
    .auth-form-container.active { display:block; }

    .loading-overlay {
      display:none;
      position:absolute;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(255,255,255,0.8);
      border-radius:30px;
      align-items:center;
      justify-content:center;
      font-size:1.5em;
      z-index:10;
    }

    .loading-overlay.show { display:flex; }
  </style>
</head>
<body>

<div class="modal-overlay active" id="authModal">
  <div class="auth-container">

    <div class="loading-overlay" id="loadingOverlay">⏳</div>

    <button class="close-btn" onclick="closeModal()">×</button>

    <!-- تسجيل الدخول -->
    <div id="loginForm" class="auth-form-container active">
      <div class="auth-header">
        <span class="auth-icon">🌟</span>
        <h2>تسجيل الدخول</h2>
        <p>سجّل الدخول للوصول إلى جميع المحتويات!</p>
      </div>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>📧 البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label>🔒 كلمة المرور</label>

          <div class="password-container">
            <input type="password" id="loginPassword" placeholder="••••••••" required>

            <button type="button" class="toggle-password"
              onclick="togglePassword('loginPassword')">👁️</button>
          </div>

          <span class="error-message" id="loginPasswordError"></span>
        </div>

        <button type="submit" class="btn-primary">
          تسجيل الدخول 🚀
        </button>
      </form>

      <div class="switch-form">
        ليس لديك حساب؟
        <a onclick="showSignup()">إنشاء حساب</a>
      </div>
    </div>

    <!-- إنشاء حساب -->
    <div id="signupForm" class="auth-form-container">

      <div class="auth-header">
        <span class="auth-icon">🎉</span>
        <h2>إنشاء حساب</h2>
        <p>انضم إلى مغامرة LumiLearn!</p>
      </div>

      <form class="auth-form" onsubmit="handleSignup(event)">

        <div class="form-group">
          <label>👤 الاسم</label>
          <input type="text" id="signupName" placeholder="اسمك" required minlength="2">
        </div>

        <div class="form-group">
          <label>📧 البريد الإلكتروني</label>
          <input type="email" id="signupEmail" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label>🏫 المستوى الدراسي</label>

          <select id="signupClasse" required>
            <option value="">-- اختر مستواك الدراسي --</option>
            <option value="1">السنة الأولى</option>
            <option value="2">السنة الثانية</option>
            <option value="3">السنة الثالثة</option>
            <option value="4">السنة الرابعة</option>
            <option value="5">السنة الخامسة</option>
            <option value="6">السنة السادسة</option>
          </select>
        </div>

        <div class="form-group">
          <label>🌐 اللغة المفضلة</label>

          <select id="signupLangue">
            <option value="fr">🇫🇷 الفرنسية</option>
            <option value="ar">🇸🇦 العربية</option>
            <option value="en">🇬🇧 الإنجليزية</option>
          </select>
        </div>

        <div class="form-group">
          <label>🔒 كلمة المرور</label>

          <div class="password-container">
            <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6">

            <button type="button" class="toggle-password"
              onclick="togglePassword('signupPassword')">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <label>🔒 تأكيد كلمة المرور</label>

          <div class="password-container">
            <input type="password" id="confirmPassword" placeholder="••••••••" required>

            <button type="button" class="toggle-password"
              onclick="togglePassword('confirmPassword')">👁️</button>
          </div>

          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn-primary">
          إنشاء حساب 🎈
        </button>
      </form>

      <div class="switch-form">
        لديك حساب بالفعل؟
        <a onclick="showLogin()">تسجيل الدخول</a>
      </div>
    </div>

    <!-- نجاح -->
    <div id="successMessage" class="success-message">
      <span class="success-icon">🎉</span>

      <h3>مرحبًا بك في LumiLearn!</h3>

      <p id="successText">تم تسجيل الدخول بنجاح!</p>

      <p style="margin-top:10px;color:#999;font-size:0.85em;">
        جارٍ التحويل...
      </p>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="auth.js"></script>

<script>
  window.addEventListener('load', () => {
    document.getElementById('authModal').classList.add('active');
  });

  function closeModal() {
    window.location.href = 'indexSIGHT_ar.html';
  }
</script>

</body>
</html>
```
