<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumiLearn : Livres Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleSIGHT.css" />
  <link rel="stylesheet" href="search-styles.css" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <section class="search-section">
    <div class="search-content">
      <h3>Rechercher un livre audio 🎧</h3>
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Tape le titre d'un livre...">
        <button id="searchButton">Rechercher</button>
      </div>
    </div>
    <div id="searchResults"></div>
  </section>

  <div class="container">
    <div class="home-intro">
      <h2>Livres Audio Suggérés</h2>
      <p class="section-subtitle" id="subtitleAudio">
        Écoute des histoires amusantes et éducatives faites pour toi !
      </p>
    </div>
    <!-- Indicateur de chargement -->
    <div id="loadingIndicator" style="text-align:center;padding:40px;font-size:1.2em;">
      ⏳ Chargement des livres audio...
    </div>
    <div id="audioGrid" class="resources-grid"></div>
  </div>

  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h4>🌟 LumiLearn</h4>
        <p>Une plateforme éducative pour les enfants.</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2025 LumiLearn | Projet IEEE ENSIT CS × SIGHT Group 🌟</p>
    </div>
  </footer>

  <!-- ======================================================
       JAVASCRIPT
       1. api.js  — fonctions fetch() vers le backend
       2. auth.js — gestion de la session utilisateur
  ====================================================== -->
  <script src="api.js"></script>
  <script src="auth.js"></script>

  <script>
    // Menu mobile (élément injecté par navbar.js → on vérifie qu'il existe)
    const menuToggleBtn = document.querySelector('.menu-toggle');
    if (menuToggleBtn) {
      menuToggleBtn.addEventListener('click', () => {
        document.getElementById('mobile-nav').classList.toggle('is-open');
      });
    }

    // Changement de langue (idem : peut être injecté par la navbar)
    const langSelectEl = document.getElementById('langSelect');
    if (langSelectEl) {
      langSelectEl.addEventListener('change', e => {
        if (e.target.value === 'ar') window.location.href = 'audio_ar.html';
        else if (e.target.value === 'en') window.location.href = 'audio_en.html';
      });
    }

    // ── Référence locale aux audios chargés (pour la recherche) ──
    let tousLesAudios = [];

    // ── Afficher les cartes ───────────────────────────────────────
    function renderAudios(liste) {
      const grid = document.getElementById('audioGrid');
      document.getElementById('loadingIndicator').style.display = 'none';

      if (!liste || liste.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:#666;">Aucun livre audio trouvé.</p>';
        return;
      }

      // Le backend sert les MP3 statiquement → URL complète
      const BASE = 'http://localhost:5001/';

      grid.innerHTML = liste.map(book => `
        <div class="resource-card">
          <div style="font-size:2.5em;margin-bottom:10px;">${book.emoji || '🎧'}</div>
          <h3>${book.titre}</h3>
          <p>${book.description}</p>
          ${book.niveau > 0 ? `<span style="background:#FFE5F1;color:#FF91AF;
            padding:3px 10px;border-radius:20px;font-size:0.8em;">
            Classe ${book.niveau}</span>` : ''}
          <audio controls src="${BASE}${book.fichier}"
            style="margin-top:15px;width:100%;"
            onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          </audio>
          <p style="display:none;color:#f44336;font-size:0.85em;">
            ⚠️ Fichier audio non disponible
          </p>
        </div>
      `).join('');
    }

    // ── Recherche locale (filtre sur les audios déjà chargés) ────
    function searchAudio() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = tousLesAudios.filter(b =>
        b.titre.toLowerCase().includes(q) ||
        b.description.toLowerCase().includes(q)
      );
      renderAudios(filtered.length ? filtered : tousLesAudios);
    }

    document.getElementById('searchButton').addEventListener('click', searchAudio);
    document.getElementById('searchInput').addEventListener('keyup', e => {
      if (e.key === 'Enter') searchAudio();
    });

    // ── Charger les audios depuis le backend ──────────────────────
    async function chargerAudios() {
      try {
        const user = getCurrentUser();

        let data;
        if (user) {
          // Utilisateur connecté → audios adaptés à sa classe
          document.getElementById('subtitleAudio').textContent =
            `Livres audio recommandés pour la Classe ${user.classe} 🎓`;
          data = await apiAudiosParClasse(user.classe);
        } else {
          // Non connecté → tous les audios
          data = await apiAudiosParLangue('fr');
        }

        if (data.success) {
          tousLesAudios = data.audios;
          renderAudios(tousLesAudios);
        } else {
          throw new Error(data.message);
        }
      } catch (err) {
        console.error('Erreur chargement audios :', err.message);
        // Fallback : afficher les audios locaux si le backend n'est pas disponible
        document.getElementById('loadingIndicator').innerHTML =
          '⚠️ Backend non disponible — affichage des données locales';
        const fallback = [
          { titre:'The Little Seed',        description:"Comment une petite graine devient un arbre puissant.", fichier:'Audio/THETINYSEED.mp3', emoji:'🌱', niveau:0 },
          { titre:'A Day at the Farm',       description:"Découvre les animaux qui vivent à la ferme.",          fichier:'Audio/Farm.mp3',         emoji:'🐄', niveau:1 },
          { titre:'How to Catch a Rainbow',  description:"Apprends les couleurs à travers une histoire joyeuse.",fichier:'Audio/RAINBOW.mp3',      emoji:'🌈', niveau:1 },
          { titre:'Planet Earth',            description:"Explore les merveilles de notre planète !",            fichier:'Audio/Earth.mp3',         emoji:'🌍', niveau:3 },
          { titre:'My First Math',           description:"Compter devient amusant pour les jeunes apprenants.",  fichier:'Audio/Math.mp3',          emoji:'🔢', niveau:1 },
          { titre:'The Brave Little Star',   description:"Une histoire sur le courage et l'amitié.",             fichier:'Audio/Star.mp3',          emoji:'⭐', niveau:0 }
        ];
        // En fallback, les fichiers audio sont locaux
        tousLesAudios = fallback.map(a => ({ ...a, fichier: a.fichier }));
        document.getElementById('loadingIndicator').style.display = 'none';
        renderAudios(tousLesAudios.map(a => ({
          ...a, fichier: a.fichier  // chemin local (pas de préfixe BASE)
        })));
        // Re-render avec chemin local
        const grid = document.getElementById('audioGrid');
        grid.innerHTML = fallback.map(book => `
          <div class="resource-card">
            <div style="font-size:2.5em;margin-bottom:10px;">${book.emoji}</div>
            <h3>${book.titre}</h3>
            <p>${book.description}</p>
            <audio controls src="${book.fichier}" style="margin-top:15px;width:100%;"></audio>
          </div>
        `).join('');
      }
    }

    // Démarrer le chargement
    chargerAudios();
  </script>
  <script src="navbar.js"></script>
  <script>initNavbar('fr')</script>

</body>
</html>
